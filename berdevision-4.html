<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berdevision</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cormorant:ital,wght@1,300;1,400&family=DM+Sans:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; }
a, button, input, select, textarea, label, [role="button"], [tabindex] { cursor: none !important; }

:root {
  --ink: #eceae4;
  --paper: #0d0b08;
  --mid: #6a6a6a;
  --dim: rgba(12,12,12,0.1);
  --dim2: rgba(12,12,12,0.05);
  --glass-bg: rgba(255,255,255,0.45);
  --glass-border: rgba(255,255,255,0.7);
  --glass-blur: blur(20px) saturate(180%);
}

html { scroll-behavior: smooth; cursor: none !important; background: #eceae4; }
body { position: relative; }

body {
  background: transparent;
  color: var(--paper);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  cursor: none !important;
}

nav { overflow: hidden; }
.reel-wrap { overflow: hidden; }
#contact, #contact-about { overflow: hidden; }
.about-page { overflow: hidden; }
footer { overflow: hidden; }
#bg-canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: auto;
  min-height: 100%;
  z-index: 0;
  pointer-events: none;
  object-fit: cover;
  object-position: center top;
  opacity: 0.22;
}

/* All page content sits above canvas */
nav, .reel-wrap, .slogan-wrap, #work, #about, #contact, #contact-about, footer {
  position: relative;
  z-index: 1;
}

/* GLOSS EFFECT */
.gloss {
  position: relative;
  isolation: isolate;
}
.gloss::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(
    ellipse 55% 40% at var(--gloss-x, 30%) var(--gloss-y, 0%),
    rgba(255,255,255,0.55) 0%,
    rgba(255,255,255,0.2) 30%,
    rgba(255,255,255,0) 65%
  );
  pointer-events: none;
  z-index: 4;
  border-radius: inherit;
}

.glass-shine {
  position: relative;
  overflow: hidden;
}
.glass-shine::before {
  content: '';
  position: absolute;
  top: 0; left: -100%; right: -100%;
  height: 2px;
  background: linear-gradient(
    90deg,
    transparent 0%,
    rgba(255,255,255,0.9) var(--shine-x, 30%),
    rgba(255,255,255,1) calc(var(--shine-x, 30%) + 8%),
    rgba(255,255,255,0.9) calc(var(--shine-x, 30%) + 16%),
    transparent 100%
  );
  pointer-events: none;
  z-index: 5;
  transition: background 0.05s;
}

.glass-reflect {
  position: relative;
  overflow: hidden;
}
.glass-reflect::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 40%;
  background: linear-gradient(
    to bottom,
    rgba(255,255,255,0.22) 0%,
    rgba(255,255,255,0.06) 60%,
    rgba(255,255,255,0) 100%
  );
  pointer-events: none;
  z-index: 2;
}
.glass-reflect::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: rgba(255,255,255,0.9);
  pointer-events: none;
  z-index: 3;
}

/* GLASS ARROW CURSOR */
#glassCursor {
  position: fixed;
  top: 0; left: 0;
  pointer-events: none;
  z-index: 99999;
  will-change: transform;
}
#glassCursor svg {
  transition: transform 0.15s cubic-bezier(0.23,1,0.32,1);
}
#glassCursor.hovered svg {
  transform: scale(1.15);
}

/* FILM GRAIN */
.grain {
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 99997;
  opacity: 0.035;
  animation: grain 0.8s steps(1) infinite;
}
@keyframes grain {
  0%   { transform: translate(0, 0); }
  10%  { transform: translate(-2%, -3%); }
  20%  { transform: translate(3%, 1%); }
  30%  { transform: translate(-1%, 4%); }
  40%  { transform: translate(4%, -2%); }
  50%  { transform: translate(-3%, 3%); }
  60%  { transform: translate(2%, -4%); }
  70%  { transform: translate(-4%, 1%); }
  80%  { transform: translate(3%, 3%); }
  90%  { transform: translate(-2%, -1%); }
  100% { transform: translate(1%, 4%); }
}

/* CROP MARKS */
.crop-mark {
  position: absolute;
  width: 12px; height: 12px;
  pointer-events: none;
  z-index: 10;
}
.crop-mark::before, .crop-mark::after {
  content: '';
  position: absolute;
  background: rgba(12,12,12,0.2);
}
.crop-mark::before { width: 1px; height: 100%; left: 0; top: 0; }
.crop-mark::after { width: 100%; height: 1px; left: 0; top: 0; }
.crop-mark.tl { top: 1rem; left: 1rem; }
.crop-mark.tr { top: 1rem; right: 1rem; transform: scaleX(-1); }
.crop-mark.bl { bottom: 1rem; left: 1rem; transform: scaleY(-1); }
.crop-mark.br { bottom: 1rem; right: 1rem; transform: scale(-1); }

/* NAV */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.8rem 3rem;
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(28px) saturate(200%);
  -webkit-backdrop-filter: blur(28px) saturate(200%);
  border-bottom: 1px solid rgba(255,255,255,0.9);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.8),
    0 4px 24px rgba(12,12,12,0.08),
    inset 0 1px 0 rgba(255,255,255,1);
}
.nav-logo {
  display: flex;
  align-items: center;
  text-decoration: none;
  position: relative;
  z-index: 1;
}
.nav-logo-img {
  width: 110px;
  height: auto;
  display: block;
  opacity: 1;
  mix-blend-mode: normal;
  filter: none;
  transition: opacity 0.2s;
}
.nav-logo:hover .nav-logo-img {
  opacity: 0.7;
  filter: none;
}
.nav-links {
  display: flex; gap: 2.5rem; list-style: none;
}
.nav-links a {
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(12,12,12,1);
  text-decoration: none;
  transition: color 0.2s;
}
.nav-links a:hover { color: rgba(12,12,12,0.6); }

/* REEL — always dark, it's a video player */
.reel-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  background: #080808;
  overflow: hidden;
}
.reel-placeholder {
  position: absolute; inset: 0;
  background: #0a0a0a;
  display: flex; align-items: center; justify-content: center;
}
.reel-placeholder::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(255,255,255,0.018) 2px, rgba(255,255,255,0.018) 3px
  );
  pointer-events: none;
}
.reel-inner {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; gap: 1.2rem;
}
.reel-icon {
  width: 68px; height: 68px;
  border: 1px solid rgba(240,237,232,0.2);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  animation: breathe 3s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { transform: scale(1); border-color: rgba(240,237,232,0.15); }
  50% { transform: scale(1.06); border-color: rgba(240,237,232,0.5); }
}
.reel-hint {
  font-size: 0.65rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(240,237,232,0.25);
}
.reel-video {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}
.reel-vimeo {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  overflow: hidden;
}
.reel-vimeo iframe {
  position: absolute;
  top: 50%; left: 50%;
  width: 100%; height: 100%;
  min-width: 177.78vh;
  min-height: 56.25vw;
  transform: translate(-50%, -50%);
  border: none;
}
.reel-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 2rem 3rem;
  background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  z-index: 3;
}
.reel-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3rem;
  letter-spacing: 0.08em;
  line-height: 1;
  color: #f0ede8;
}
.reel-tagline {
  font-size: 0.65rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(240,237,232,0.45);
  margin-top: 0.4rem;
}
.reel-slogan {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.5rem, 5vw, 4.5rem);
  letter-spacing: 0.04em;
  line-height: 1;
  color: #f0ede8;
  margin-bottom: 1rem;
  text-shadow: 0 2px 24px rgba(0,0,0,0.3);
}
.btn-reel {
  display: inline-block;
  font-size: 0.7rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #f0ede8;
  text-decoration: none;
  border-bottom: 1px solid rgba(240,237,232,0.4);
  padding-bottom: 3px;
  transition: border-color 0.2s, opacity 0.2s;
  opacity: 0.7;
}
.btn-reel:hover { opacity: 1; border-color: #f0ede8; }
.reel-mute {
  background: transparent;
  border: 1px solid rgba(240,237,232,0.2);
  color: rgba(240,237,232,0.45);
  font-size: 0.62rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-family: 'DM Sans', sans-serif;
  padding: 0.4rem 0.9rem;
  cursor: none;
  transition: all 0.2s;
  display: none;
}
.reel-mute:hover { color: #f0ede8; border-color: rgba(240,237,232,0.6); }
.reel-mute.visible { display: block; }

/* WORK */
#work {
  padding: 2rem 3rem 6rem;
  position: relative;
}

.work-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.8rem;
}

.work-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(1.8rem, 3vw, 2.8rem);
  letter-spacing: 0.06em;
  color: var(--paper);
  line-height: 1;
}

.work-filter { display: flex; gap: 0.4rem; flex-wrap: wrap; justify-content: flex-end; margin-bottom: 0; }

.work-grid-wrap {
  position: relative;
  padding: 0 4rem;
}
.work-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.75rem;
}
.work-item {
  position: relative; overflow: hidden;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(12px) saturate(160%);
  -webkit-backdrop-filter: blur(12px) saturate(160%);
  border: 1px solid rgba(255,255,255,0.7);
  box-shadow:
    0 4px 16px rgba(12,12,12,0.07),
    inset 0 1px 0 rgba(255,255,255,0.95),
    inset 0 -1px 0 rgba(255,255,255,0.2);
  transition: opacity 0.4s, transform 0.15s ease, box-shadow 0.15s ease;
  transform-style: preserve-3d;
  will-change: transform;
  aspect-ratio: 1 / 1;
  cursor: none;
}
.work-item::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 50%;
  background: linear-gradient(to bottom, rgba(255,255,255,0.3), rgba(255,255,255,0));
  pointer-events: none;
  z-index: 1;
}
.work-item::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(
    ellipse 50% 50% at var(--gloss-x, 50%) var(--gloss-y, 50%),
    rgba(255,255,255,0.28) 0%,
    rgba(255,255,255,0.08) 40%,
    transparent 70%
  );
  pointer-events: none;
  z-index: 2;
  opacity: 0;
  transition: opacity 0.3s;
}
.work-item:hover::after { opacity: 1; }

/* Video container styling */
.video-container {
  width: 100%;
  height: 100%;
  position: relative;
  overflow: hidden;
}
.video-container iframe {
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0;
  left: 0;
  border: none;
}

.thumb-placeholder {
  width: 100%; aspect-ratio: 1/1;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.7s cubic-bezier(0.23,1,0.32,1);
}
.work-item:hover .thumb-placeholder { transform: scale(1.05); }

.thumb-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 4rem;
  font-weight: 300;
  color: rgba(12,12,12,0.06);
  letter-spacing: -0.02em;
  user-select: none;
  transition: color 0.4s;
}
.work-item:hover .thumb-num { color: rgba(12,12,12,0.1); }

.work-overlay {
  position: absolute; inset: 0;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(18px) saturate(180%);
  -webkit-backdrop-filter: blur(18px) saturate(180%);
  border-top: 1px solid rgba(255,255,255,0.4);
  padding: 1.4rem;
  display: flex; flex-direction: column; justify-content: flex-end;
  opacity: 0;
  transition: opacity 0.4s;
}
.work-item:hover .work-overlay { opacity: 1; }
.work-tag {
  font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(12,12,12,0.45); margin-bottom: 0.3rem;
}
.work-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.6rem; font-weight: 300;
  letter-spacing: 0.02em; line-height: 1.1;
  color: var(--paper);
}

/* ABOUT */
#about {
  padding: 6rem 3rem;
  position: relative;
}

.about-grid {
  display: grid;
  grid-template-columns: 1fr 1.6fr;
  gap: 6rem;
  align-items: start;
  position: relative;
}
.about-portrait {
  position: relative;
  aspect-ratio: 3/4;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(16px) saturate(160%);
  -webkit-backdrop-filter: blur(16px) saturate(160%);
  border: 1px solid rgba(255,255,255,0.7);
  box-shadow:
    0 8px 32px rgba(12,12,12,0.06),
    inset 0 1px 0 rgba(255,255,255,1),
    inset 0 -1px 0 rgba(255,255,255,0.15);
  overflow: hidden;
}
.about-portrait::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 30%;
  background: linear-gradient(to bottom, rgba(255,255,255,0.2), rgba(255,255,255,0));
  pointer-events: none;
  z-index: 1;
}
.portrait-inner {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
}
.portrait-lines {
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    -45deg,
    transparent, transparent 40px,
    rgba(12,12,12,0.04) 40px, rgba(12,12,12,0.04) 41px
  );
}
.portrait-label {
  position: absolute; bottom: 1.2rem; left: 1.2rem;
  font-size: 0.58rem; letter-spacing: 0.16em; text-transform: uppercase;
  color: rgba(12,12,12,0.3);
}
.portrait-corner {
  position: absolute;
  width: 20px; height: 20px;
}
.portrait-corner.tl { top: 1rem; left: 1rem; border-top: 1px solid rgba(12,12,12,0.2); border-left: 1px solid rgba(12,12,12,0.2); }
.portrait-corner.br { bottom: 1rem; right: 1rem; border-bottom: 1px solid rgba(12,12,12,0.2); border-right: 1px solid rgba(12,12,12,0.2); }

.about-body { padding-top: 0.5rem; }
.about-body p {
  font-size: 1rem;
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  line-height: 1.85;
  color: rgba(12,12,12,0.6);
  margin-bottom: 1.2rem;
}
.about-body p strong { color: var(--paper); font-weight: 500; }

/* CONTACT */
#contact, #contact-about {
  padding: 3.5rem 3rem;
  background: transparent;
  position: relative;
}
.contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3.5rem; align-items: start; }

.contact-form-glass {
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(28px) saturate(200%);
  -webkit-backdrop-filter: blur(28px) saturate(200%);
  border: 1px solid rgba(255,255,255,0.75);
  border-radius: 16px;
  padding: 1.8rem;
  box-shadow:
    0 12px 48px rgba(12,12,12,0.08),
    0 2px 8px rgba(12,12,12,0.04),
    inset 0 1px 0 rgba(255,255,255,1),
    inset 0 -1px 0 rgba(255,255,255,0.2);
  position: relative;
  overflow: hidden;
}
.contact-form-glass::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 35%;
  background: linear-gradient(to bottom, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 100%);
  border-radius: 16px 16px 0 0;
  pointer-events: none;
}

.contact-big {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(1.8rem, 3vw, 2.6rem);
  line-height: 1.15;
  margin-bottom: 1.2rem;
  color: var(--paper);
}

.contact-links { display: flex; flex-direction: column; gap: 0.85rem; }
.contact-links a {
  font-size: 1rem; color: rgba(12,12,12,0.4); text-decoration: none;
  letter-spacing: 0.08em;
  display: flex; align-items: center; gap: 0.75rem;
  transition: color 0.2s; width: fit-content;
  position: relative;
}
.contact-links a::after {
  content: '';
  position: absolute; bottom: -2px; left: 0; right: 0;
  height: 1px; background: var(--paper);
  transform: scaleX(0); transform-origin: left;
  transition: transform 0.3s cubic-bezier(0.23,1,0.32,1);
}
.contact-links a:hover { color: var(--paper); }
.contact-links a:hover::after { transform: scaleX(1); }

.form-group { margin-bottom: 0.7rem; }
.form-label {
  display: block; font-size: 0.6rem; letter-spacing: 0.16em; text-transform: uppercase;
  color: rgba(12,12,12,0.3); margin-bottom: 0.45rem;
}
.form-input, .form-textarea, .form-select {
  width: 100%; background: transparent;
  border: none; border-bottom: 1px solid rgba(12,12,12,0.18);
  color: var(--paper); padding: 0.6rem 0;
  font-size: 0.9rem; font-family: 'DM Sans', sans-serif; font-weight: 300;
  outline: none; transition: border-color 0.25s; appearance: none;
}
.form-input:focus, .form-textarea:focus, .form-select:focus {
  border-color: rgba(12,12,12,0.5);
}
.form-textarea { min-height: 90px; resize: none; }
.form-select { background: transparent; cursor: none; }
.form-select option { background: #e8e5e0; }
.form-submit {
  margin-top: 1.5rem;
  background: transparent;
  border: 1px solid rgba(12,12,12,0.25);
  color: rgba(12,12,12,0.7);
  padding: 0.85rem 2.5rem;
  font-size: 0.7rem; font-weight: 400; letter-spacing: 0.18em; text-transform: uppercase;
  font-family: 'DM Sans', sans-serif; cursor: none;
  transition: all 0.25s;
  position: relative; overflow: hidden;
}
.form-submit::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--paper);
  transform: translateX(-100%);
  transition: transform 0.35s cubic-bezier(0.23,1,0.32,1);
}
.form-submit:hover::before {
  transform: translateX(0);
}
.form-submit:hover {
  color: rgba(255,255,255,0.9);
}

/* FOOTER */
footer {
  padding: 2rem 3rem;
  text-align: center;
  border-top: 1px solid rgba(12,12,12,0.1);
  font-size: 0.7rem;
  color: rgba(12,12,12,0.3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
</style>
</head>
<body>

<!-- WORK SECTION -->
<section id="work">
  <div class="work-header">
    <h2 class="work-title">WORK</h2>
    <div class="work-filter">
      <button class="filter-btn active">VIDEO</button>
      <button class="filter-btn">PHOTO</button>
    </div>
  </div>
  
  <div class="work-grid-wrap">
    <div class="work-grid">
      <!-- Videos will load here via video-loader.js -->
    </div>
  </div>
</section>

<!-- Load the video loader script -->
<script src="video-loader.js"></script>

</body>
</html>
